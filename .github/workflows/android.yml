name: Android APK Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      
      - name: Install Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-31 build-tools;31.0.0'
      
      - name: Install frontend dependencies
        run: npm ci
      
      - name: Initialize Tauri Android
        run: npx tauri android init
        continue-on-error: true
      
      - name: Build Debug APK (signed automatically)
        run: npx tauri android build --debug
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nebula-chat-android-apk
          path: |
            src-tauri/gen/android/app/build/outputs/apk/universal/debug/*.apk
            src-tauri/gen/android/app/build/outputs/apk/**/debug/*.apk
          retention-days: 30
      
      - name: Create release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "🎉 Nebula Chat Android APK 构建成功！" > release-notes.txt
          echo "" >> release-notes.txt
          echo "构建时间：$(date)" >> release-notes.txt
          echo "版本：${{ github.ref_name }}" >> release-notes.txt
          echo "提交：${{ github.sha }}" >> release-notes.txt
      
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
            src-tauri/gen/android/app/build/outputs/apk/**/release/*.apk
          body_path: release-notes.txt
          draft: false
          prerelease: false

  build-web:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build web version
        run: npm run build
      
      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: nebula-chat-web
          path: dist/
          retention-days: 30
