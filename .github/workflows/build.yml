name: Build Nebula Chat

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [published]

jobs:
  # macOS 构建
  build-macos:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install dependencies
        run: |
          npm ci
          cd src-tauri
          cargo check
      
      - name: Build Tauri App
        run: npm run tauri build
        
      - name: Upload macOS App
        uses: actions/upload-artifact@v4
        with:
          name: nebula-chat-macos
          path: src-tauri/target/release/bundle/
          retention-days: 30

  # Windows 构建
  build-windows:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install WebView2
        run: |
          Start-Process "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -Wait
      
      - name: Install dependencies
        run: |
          npm ci
          cd src-tauri
          cargo check
      
      - name: Build Tauri App
        run: npm run tauri build
        
      - name: Upload Windows App
        uses: actions/upload-artifact@v4
        with:
          name: nebula-chat-windows
          path: src-tauri/target/release/bundle/
          retention-days: 30

  # Linux 构建
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      
      - name: Install dependencies
        run: |
          npm ci
          cd src-tauri
          cargo check
      
      - name: Build Tauri App
        run: npm run tauri build
        
      - name: Upload Linux App
        uses: actions/upload-artifact@v4
        with:
          name: nebula-chat-linux
          path: src-tauri/target/release/bundle/
          retention-days: 30

  # 创建 Release（仅当发布时）
  create-release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release Assets
        run: |
          cd artifacts
          # 整理文件用于发布
          find . -name "*.dmg" -o -name "*.exe" -o -name "*.deb" -o -name "*.AppImage" | ls -la
      
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/nebula-chat-macos/**/*.dmg
            artifacts/nebula-chat-windows/**/*.msi
            artifacts/nebula-chat-windows/**/*.exe
            artifacts/nebula-chat-linux/**/*.deb
            artifacts/nebula-chat-linux/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
